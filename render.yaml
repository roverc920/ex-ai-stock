services:
  # Backend Web Service
  - type: web
    name: stock-analyzer-api
    runtime: python
    repo: https://github.com/roverc920/ex-ai-stock.git
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_API_URL
        value: https://api.deepseek.com
      - key: CORS_ORIGINS
        value: https://stock-analyzer-web.onrender.com

  # Frontend Static Site
  - type: web
    name: stock-analyzer-web
    runtime: static
    repo: https://github.com/roverc920/ex-ai-stock.git
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: stock-analyzer-api
          property: url
